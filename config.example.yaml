# Gatekeeper configuration
# Copy to config.yaml and fill in your values
#
# Per-app configs can also be placed in config.d/<app-slug>.yaml
# See config.d.example/ for the fragment format.

server:
  host: "127.0.0.1"
  port: 9100
  # Secret key for signing session cookies - generate with: python -c "import secrets; print(secrets.token_hex(32))"
  secret_key: "CHANGE_ME"
  # Optional: shown as banner in admin UI (e.g. "STAGING")
  # environment: "STAGING"

database:
  # SQLite database path (relative to working directory)
  path: "gatekeeper.db"

oauth:
  google:
    client_id: ""
    client_secret: ""
  github:
    client_id: ""
    client_secret: ""

# Apps can be defined here and/or in config.d/<slug>.yaml files
apps:

  # Example 1: Simple app with nag screen
  # Sessions 1-5: pass through, 6-10: nag screen, 11+: must sign in
  myapp-prod:
    name: "My App (Production)"
    domains:
      - "myapp.example.com"
    protected_paths:
      - "/admin/*"
    paywall:
      nag_after_sessions: 5
      max_sessions_per_week: 10
      # Optional: custom nag page HTML (omit to use gatekeeper's default)
      # nag_html_file: "/home/jonnosan/myapp/nag.html"
    # Optional: custom login page HTML
    # login_html_file: "/home/jonnosan/myapp/login.html"
    # Optional: restrict sign-in to specific emails (empty = anyone)
    # allowed_emails:
    #   - "alice@example.com"
    #   - "bob@example.com"
    roles:
      - "user"
      - "admin"
    default_role: "user"

  # Example 2: App with JS frontend + backend API
  # Frontend pages are open (with paywall). API paths require an API key.
  # Anonymous frontend users get a temp key (30 min). Registered users get
  # a key lasting registered_key_duration_hours or registered_key_duration_days.
  webapp-prod:
    name: "Web App (Production)"
    domains:
      - "webapp.example.com"
    protected_paths:
      - "/admin/*"
    paywall:
      max_sessions_per_week: 10
    api_access:
      mode: "key_required"
      paths:
        - "/api/*"
      temp_key_duration_minutes: 30
      registered_key_duration_days: 365
      # registered_key_duration_hours: 3  # alternative (takes precedence over days)
      api_rate_limits:
        temp_anonymous_per_minute: 500
        temp_authenticated_per_minute: 1500
        registered_per_minute: 100
        max_temp_anonymous: 10
        max_temp_authenticated: 50
        max_registered: 500
    roles:
      - "user"
      - "admin"
    default_role: "user"

  # Example 3: API-only app (open mode, paywall tracks by IP)
  api-prod:
    name: "API Service (Production)"
    domains:
      - "api.example.com"
    paywall:
      max_api_calls_per_hour: 100
    api_access:
      mode: "open"
    roles:
      - "user"
      - "admin"
    default_role: "user"

  # Example 4: Restricted admin-only app
  gatekeeper:
    name: "Gatekeeper Admin"
    domains:
      - "gatekeeper.example.com"
    protected_paths:
      - "/*"
    allowed_emails:
      - "admin@example.com"
    roles:
      - "admin"
    default_role: "admin"

rate_limit:
  # Max requests per IP per minute (anonymous users)
  requests_per_minute: 120
  # Max requests per IP per minute (authenticated users, 0 = use default)
  authenticated_requests_per_minute: 0
  # Burst allowance
  burst: 30
