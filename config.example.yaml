# Gatekeeper configuration
# Copy to config.yaml and fill in your values

server:
  host: "127.0.0.1"
  port: 9100
  # Secret key for signing session cookies - generate with: python -c "import secrets; print(secrets.token_hex(32))"
  secret_key: "CHANGE_ME"

database:
  # SQLite database path (relative to working directory)
  path: "gatekeeper.db"

oauth:
  google:
    client_id: ""
    client_secret: ""

# Each app that gatekeeper protects
apps:

  # Example 1: Simple app, no API key requirement
  myapp-prod:
    name: "My App (Production)"
    domains:
      - "myapp.example.com"
    protected_paths:
      - "/admin/*"
    paywall:
      max_sessions_per_week: 10
    roles:
      - "user"
      - "admin"
    default_role: "user"

  # Example 2: App with JS frontend + backend API
  # Frontend pages are open (with paywall). API paths require an API key.
  # Anonymous frontend users get a temp key (30 min). Registered users get
  # a long-lived key (365 days).
  webapp-prod:
    name: "Web App (Production)"
    domains:
      - "webapp.example.com"
    protected_paths:
      - "/admin/*"
    paywall:
      max_sessions_per_week: 10
    api_access:
      mode: "key_required"
      paths:
        - "/api/*"
      temp_key_duration_minutes: 30
      registered_key_duration_days: 365
    roles:
      - "user"
      - "admin"
    default_role: "user"

  # Example 3: API-only app (open mode, paywall tracks by IP)
  api-prod:
    name: "API Service (Production)"
    domains:
      - "api.example.com"
    paywall:
      max_api_calls_per_hour: 100
    api_access:
      mode: "open"
    roles:
      - "user"
      - "admin"
    default_role: "user"

  # Example 4: Staging with guest approval workflow
  myapp-staging:
    name: "My App (Staging)"
    domains:
      - "staging.myapp.example.com"
    protected_paths:
      - "/*"
    roles:
      - "user"
      - "admin"
      - "guest"
    default_role: "guest"

rate_limit:
  # Global rate limit: max requests per IP per minute
  requests_per_minute: 120
  # Burst allowance
  burst: 30
