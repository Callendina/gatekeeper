# Example per-app config fragment.
# Place in config.d/ as <app-slug>.yaml
# The filename (minus .yaml) becomes the app slug.

name: "My App (Production)"
domains:
  - "myapp.example.com"
protected_paths:
  - "/admin/*"
paywall:
  nag_after_sessions: 5
  max_sessions_per_week: 10
  # nag_html_file: "/srv/myapp/nag.html"
# login_html_file: "/srv/myapp/login.html"
# admin_api_key: ""  # secret for /_auth/status/{slug}/keys endpoint
# allowed_emails: []  # empty = anyone can sign in
# magic_link:
#   enabled: true                    # requires email config in main config.yaml
#   link_expiry_minutes: 15
#   rate_limit_per_email_minutes: 2
#   rate_limit_per_ip_per_10min: 5
#   pending_html_file: ""            # custom HTML: {{APP_NAME}}, {{CODE_SUBMIT_URL}}, {{WAITLIST_SUBMIT_URL}}, {{LOGOUT_URL}}, {{USER_EMAIL}}
#   sent_html_file: ""               # custom HTML: {{APP_NAME}}, {{MESSAGE}}, {{LOGIN_URL}}
roles:
  - "user"
  - "admin"
default_role: "user"
